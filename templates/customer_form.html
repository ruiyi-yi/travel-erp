<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ '编辑客户' if customer else '新增客户' }} - 悠享假期</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f5;display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,#1a1a2e,#16213e);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar-header{padding:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}.sidebar-header h3{font-size:16px;letter-spacing:2px}.sidebar-header small{color:rgba(255,255,255,.5);font-size:11px}
.user-info{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;background:#FF9933;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.user-details .name{font-size:13px}.user-details .role{font-size:11px;color:rgba(255,255,255,.5)}
.nav-menu{flex:1;padding:10px 0}.nav-group-title{padding:10px 20px 5px;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px}
.nav-item{display:flex;align-items:center;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;gap:10px;font-size:14px;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.08);color:#FF9933;border-left-color:#FF9933}
.sidebar-footer{padding:15px 20px;border-top:1px solid rgba(255,255,255,.1)}.sidebar-footer a{color:rgba(255,255,255,.5);text-decoration:none;font-size:12px}
.main-content{margin-left:230px;flex:1}
.top-bar{background:#fff;padding:15px 30px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center}.top-bar h2{font-size:18px;color:#333}
.content-area{padding:25px 30px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.card-header{padding:18px 25px;border-bottom:1px solid #f0f0f0;font-weight:600;font-size:15px}.card-body{padding:25px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.form-group label{display:block;margin-bottom:6px;color:#555;font-size:13px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;height:40px;border:1px solid #ddd;border-radius:6px;padding:0 12px;font-size:13px;outline:none}
.form-group textarea{height:80px;padding:10px 12px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#FF9933;box-shadow:0 0 0 3px rgba(255,153,51,.1)}
.form-actions{padding:20px 0;display:flex;gap:10px}
.btn{padding:10px 24px;border:none;border-radius:6px;cursor:pointer;font-size:14px;text-decoration:none;display:inline-block}
.btn-primary{background:#FF9933;color:#fff}.btn-outline{border:1px solid #ddd;background:#fff;color:#666}
@media(max-width:900px){.form-grid{grid-template-columns:1fr 1fr}}@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
</style></head>
<body>
{% include '_sidebar.html' %}
<div class="main-content">
<div class="top-bar"><h2>{{ '✏️ 编辑客户' if customer else '➕ 新增客户' }}</h2><a href="{{ url_for('customer_list', ym=ym) }}" class="btn btn-outline">← 返回列表</a></div>
<div class="content-area">
<div class="card"><div class="card-header">{{ '编辑客户' if customer else '新增客户' }}</div>
<div class="card-body">
<form method="post">
<div class="form-grid">
<div class="form-group"><label>姓名 *</label><input type="text" name="name" value="{{ customer.name if customer else '' }}" required></div>
<div class="form-group"><label>电话</label><input type="text" name="phone" value="{{ customer.phone if customer else '' }}"></div>
<div class="form-group"><label>邮箱</label><input type="email" name="email" value="{{ customer.email if customer else '' }}"></div>
<div class="form-group"><label>证件类型</label><select name="id_type">{% for t in ['身份证','护照','军官证','港澳通行证','台胞证','其他'] %}<option value="{{ t }}" {{ 'selected' if customer and customer.id_type==t }}>{{ t }}</option>{% endfor %}</select></div>
<div class="form-group"><label>证件号码</label><input type="text" name="id_number" value="{{ customer.id_number if customer else '' }}"></div>
<div class="form-group"><label>性别</label><select name="gender"><option value="男" {{ 'selected' if customer and customer.gender=='男' }}>男</option><option value="女" {{ 'selected' if customer and customer.gender=='女' }}>女</option></select></div>
<div class="form-group"><label>出生日期</label><input type="date" name="birthday" value="{{ customer.birthday if customer else '' }}"></div>
<div class="form-group"><label>国籍</label><input type="text" name="nationality" value="{{ customer.nationality if customer else '中国' }}"></div>
<div class="form-group"><label>地址</label><input type="text" name="address" value="{{ customer.address if customer else '' }}"></div>
<div class="form-group" style="grid-column:1/-1"><label>备注</label><textarea name="notes">{{ customer.notes if customer else '' }}</textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary">💾 保存</button><a href="{{ url_for('customer_list', ym=ym) }}" class="btn btn-outline">取消</a></div>
</form></div></div></div></div>
</body>
</html>
